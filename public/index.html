<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeStreets Oakville</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <div class="logo-icon">&#9655;</div>
      <div>
        <div class="logo-title">SafeStreets</div>
        <div class="logo-sub">Oakville, Ontario</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">Reports</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-pending">—</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-actioned">—</div>
        <div class="stat-label">Actioned</div>
      </div>
    </div>

    <button class="report-btn" id="report-btn">+ Report a Danger Spot</button>

    <div class="filter-row">
      <button class="filter-chip active" data-filter="all">All</button>
      <button class="filter-chip" data-filter="no_crosswalk">No Crosswalk</button>
      <button class="filter-chip" data-filter="speeding">Speeding</button>
      <button class="filter-chip" data-filter="poor_lighting">Lighting</button>
      <button class="filter-chip" data-filter="blind_corner">Blind Corner</button>
      <button class="filter-chip" data-filter="other">Other</button>
    </div>

    <div class="reports-list" id="reports-list">
      <div class="empty-msg">Loading reports...</div>
    </div>

  </aside>

  <!-- MAP -->
  <main class="map-wrap">
    <div id="map"></div>
  </main>

  <!-- REPORT MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">

      <div class="modal-header">
        <h2>Report a Danger Spot</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>

      <div class="modal-body">

        <div class="field">
          <label>Issue type <span class="req">*</span></label>
          <div class="issue-grid">
            <button class="issue-btn" data-val="no_crosswalk">
              <span>⚠️</span><span>No Crosswalk</span>
            </button>
            <button class="issue-btn" data-val="speeding">
              <span>🚗</span><span>Speeding</span>
            </button>
            <button class="issue-btn" data-val="poor_lighting">
              <span>🔦</span><span>Poor Lighting</span>
            </button>
            <button class="issue-btn" data-val="blind_corner">
              <span>👁</span><span>Blind Corner</span>
            </button>
            <button class="issue-btn" data-val="no_sidewalk">
              <span>🚶</span><span>No Sidewalk</span>
            </button>
            <button class="issue-btn" data-val="other">
              <span>+</span><span>Other</span>
            </button>
          </div>
        </div>

        <div class="field">
          <label>Location <span class="req">*</span></label>
          <div class="location-row">
            <div class="location-display" id="location-display">
              Click the map to drop a pin
            </div>
            <button class="locate-btn" id="locate-btn" title="Use my location">⊕</button>
          </div>
        </div>

        <div class="field">
          <label>Street / intersection</label>
          <input type="text" id="address-input" placeholder="e.g. Trafalgar Rd & Dundas St">
        </div>

        <div class="field">
          <label>Description</label>
          <textarea id="desc-input" rows="3"
            placeholder="What makes this dangerous? Any near-misses?"></textarea>
        </div>

        <div class="field">
          <label>Photo (optional)</label>
          <div class="photo-drop" id="photo-drop">
            <input type="file" id="photo-input" accept="image/*" style="display:none">
            <span id="photo-label">📷 Tap to add a photo</span>
            <img id="photo-preview" style="display:none; max-width:100%;
              border-radius:8px; margin-top:8px;">
          </div>
        </div>

      </div>

      <div class="modal-footer">
        <button class="cancel-btn" id="cancel-btn">Cancel</button>
        <button class="submit-btn" id="submit-btn">Submit Report</button>
      </div>

    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detail-panel">
    <button class="detail-close" id="detail-close">&times;</button>
    <div id="detail-content"></div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
